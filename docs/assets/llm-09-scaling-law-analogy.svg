  <text x="70" y="350" fill="rgba(31,36,48,0.72)" font-size="22">Scaling Law 让人可以用小模型实验，在 log-log 图上外推大模型表现。</text>
  
  <path d="M 314 246.0 C 336 208, 328 284, 342 246.0" fill="none" stroke="#d08a4e" stroke-width="4" stroke-linecap="round" />
